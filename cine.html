<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Votos del Canal — Cine en Vivo</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;800&display=swap"
    rel="stylesheet">
  <meta name="description"
    content="Reacciona con nosotros. Mirá aquí la pantalla compartida y chatea en el stream oficial.">
  <style>
    :root {
      --bg: #030712;
      --bg2: #0f172a;
      --sidebar: #0b1120;
      --line: rgba(255, 255, 255, 0.08);
      --pri: #10b981;
      --ink: #f8fafc;
      --muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      color: var(--ink);
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    /* Layout principal */
    .layout {
      display: flex;
      flex: 1;
      height: calc(100vh - 60px);
    }

    .main-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #000;
      position: relative;
    }

    .chat-col {
      width: 350px;
      background: var(--sidebar);
      border-left: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      box-shadow: -4px 0 20px rgba(0, 0, 0, 0.5);
      z-index: 5;
    }

    /* Reproductor */
    .player-wrap {
      flex: 1;
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
    }

    .player-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .no-stream {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #1e293b, #020617);
      padding: 20px;
      text-align: center;
    }

    .no-stream h2 {
      font-family: "Bebas Neue";
      font-size: 48px;
      color: #fff;
      margin: 0;
      letter-spacing: 2px;
      text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
    }

    .no-stream p {
      color: var(--muted);
      margin-top: 8px;
      font-size: 15px;
    }

    /* OVERLAYS PARA OCULTAR KICK Y DAR ESTILO PREMIUM */
    .stream-cover-top {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 70px;
      background: linear-gradient(180deg, rgba(0, 0, 0, 1) 30%, rgba(0, 0, 0, 0.8) 70%, rgba(0, 0, 0, 0));
      z-index: 25;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      pointer-events: auto;
    }

    /* Bloquear marca de agua de Kick invisible */
    .stream-cover-watermark {
      position: absolute;
      bottom: 44px;
      right: 10px;
      width: 220px;
      height: 42px;
      background: transparent;
      z-index: 25;
      pointer-events: auto;
    }

    @media (max-width: 600px) {
      .stream-cover-watermark {
        bottom: 35px;
        width: 140px;
        height: 35px;
        right: 5px;
      }
    }

    /* Elementos del Header Superior */
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 99px;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-back:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateX(-4px);
    }

    .stream-title {
      font-family: "Bebas Neue", sans-serif;
      font-size: 26px;
      letter-spacing: 1px;
      background: linear-gradient(to right, #10b981, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 2px 10px rgba(16, 185, 129, 0.2);
    }

    .live-indicator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 99px;
      color: #ef4444;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 1px;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
      box-shadow: 0 0 10px #ef4444;
      animation: blink 1.5s infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.4
      }
    }

    /* Footer inferior (Controles y Redes) */
    .footer {
      height: 60px;
      background: var(--bg2);
      border-top: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 30;
      position: relative;
    }

    .f-right {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: flex-end;
      width: 100%;
    }

    .sbtn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #f8fafc;
      text-decoration: none;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.2s;
    }

    .sbtn:hover {
      transform: translateY(-2px);
      filter: brightness(1.2);
    }

    .sbtn.kick {
      background: #53fc18;
      border-color: #53fc18;
      color: #000;
      box-shadow: 0 4px 15px rgba(83, 252, 24, 0.2);
    }

    .sbtn.twitch {
      background: #9146FF;
      border-color: #9146FF;
      color: white;
      box-shadow: 0 4px 15px rgba(145, 70, 255, 0.2);
    }

    .sbtn.yt {
      background: #ff0000;
      border-color: #ff4d4d;
      color: white;
    }

    .sbtn.patreon {
      background: #FF424D;
      border-color: #FF424D;
      color: white;
    }

    /* Chat Iframe & Tabs */
    .chat-header {
      display: flex;
      background: #020617;
    }

    .chat-tab {
      flex: 1;
      padding: 14px;
      text-align: center;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 1px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      border-bottom: 2px solid transparent;
    }

    .chat-tab:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.02);
    }

    .chat-tab.active[data-target="chatKick"] {
      color: #53fc18;
      border-bottom: 2px solid #53fc18;
      background: rgba(83, 252, 24, 0.05);
    }

    .chat-tab.active[data-target="chatTwitch"] {
      color: #9146FF;
      border-bottom: 2px solid #9146FF;
      background: rgba(145, 70, 255, 0.05);
    }

    .chat-content {
      flex: 1;
      width: 100%;
      position: relative;
    }

    .chat-wrap {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: none;
    }

    .chat-wrap.active {
      display: block;
    }

    .chat-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    @media (max-width: 900px) {
      .layout {
        flex-direction: column;
      }

      .chat-col {
        width: 100%;
        height: 400px;
        border-left: none;
        border-top: 1px solid var(--line);
      }

      .f-right {
        flex-wrap: wrap;
        justify-content: center;
      }
    }
  </style>
</head>

<body>
  <div class="layout">
    <div class="main-col">
      <div class="player-wrap" id="playerWrap">

        <!-- HEADER CUSTOM -->
        <div class="stream-cover-top">
          <a href="./" class="btn-back">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
            Volver al Inicio
          </a>
          <div class="stream-title">CINE EN VIVO</div>
          <div class="live-indicator">
            <div class="live-dot"></div> DIRECTO
          </div>
        </div>

        <!-- CUBRE MARCA DE AGUA KICK INVISIBLE -->
        <div class="stream-cover-watermark"></div>

        <div id="playerFrameContainer" style="width:100%;height:100%;">
          <div class="no-stream" id="noStreamBox">
            <h2>Cargando Transmisión...</h2>
            <p>Asegúrate de que haya una escena configurada por el administrador.</p>
          </div>
        </div>
      </div>
    </div>
    <div class="chat-col">
      <div class="chat-header">
        <div class="chat-tab active" data-target="chatKick">KICK</div>
        <div class="chat-tab" data-target="chatTwitch">TWITCH</div>
      </div>
      <div class="chat-content">
        <div class="chat-wrap active" id="chatKick"></div>
        <div class="chat-wrap" id="chatTwitch"></div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="f-right">
      <a class="sbtn kick" href="https://kick.com/alecciss" target="_blank" rel="noopener">KICK</a>
      <a class="sbtn twitch" href="https://twitch.tv/alecciss" target="_blank" rel="noopener">TWITCH</a>
      <a class="sbtn yt" href="https://youtube.com/@alecciss1" target="_blank" rel="noopener">YT Anime</a>
      <a class="sbtn yt" href="https://youtube.com/@alecciss2" target="_blank" rel="noopener">YT Cine</a>
      <a class="sbtn" href="https://discord.gg/7NVwCU7RA9" target="_blank" rel="noopener">Discord</a>
      <a class="sbtn patreon" href="https://www.patreon.com/Aleccis" target="_blank" rel="noopener">Patreon</a>
    </div>
  </div>

  <div id="hiddenPlayer"
    style="position: absolute; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; z-index: -999;"></div>

  <script>
    let originalStreamUrl = "";

    // Cargar estado con cache buster garantizado
    fetch('./cine.json?t=' + Date.now()).then(r => r.json()).then(j => {
      if (j.streamUrl) {
        originalStreamUrl = j.streamUrl;
        renderPlayer(originalStreamUrl);
      } else {
        document.getElementById('playerFrameContainer').innerHTML = '<div class="no-stream"><h2>Sin Transmisión Activa</h2><p>El administrador todavía no envió ninguna escena del cine.</p></div>';
      }

      // Cargar Kick Chat
      if (j.chatUrl) {
        document.getElementById('chatKick').innerHTML = `<iframe src="${j.chatUrl}"></iframe>`;
      } else {
        document.getElementById('chatKick').innerHTML = '<div style="padding:20px;text-align:center;color:#a6b7e8">Chat de Kick no configurado.</div>';
      }

      // Cargar Twitch Chat
      if (j.twitchChannel && j.twitchParent) {
        document.getElementById('chatTwitch').innerHTML = `<iframe src="https://www.twitch.tv/embed/${j.twitchChannel}/chat?darkpopout&parent=${j.twitchParent}"></iframe>`;
      } else {
        document.getElementById('chatTwitch').innerHTML = '<div style="padding:20px;text-align:center;color:#a6b7e8">Falta el canal de Twitch o el dominio Parent en la configuración.</div>';
      }

      if (j.kickChannel) {
        // Inyectar iframe de Kick para sumar view. Muted = true ayuda al autoplay en fondo.
        document.getElementById('hiddenPlayer').innerHTML = `<iframe src="https://player.kick.com/${j.kickChannel}?muted=true&autoplay=true" allow="autoplay"></iframe>`;
      }
    }).catch(e => {
      document.getElementById('noStreamBox').innerHTML = '<h2>Error de conexión</h2><p>No se pudo cargar la info del stream.</p>';
    });

    // Función para re-renderizar reproductor
    function renderPlayer(url) {
      document.getElementById('playerFrameContainer').innerHTML = `<iframe src="${url}" allowfullscreen allow="autoplay; fullscreen"></iframe>`;
    }

    // Lógica de Pestañas
    document.querySelectorAll('.chat-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.chat-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.chat-wrap').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.getAttribute('data-target')).classList.add('active');
      });
    });
  </script>
</body>

</html>
